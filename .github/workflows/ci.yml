name: CI - Test, Build & Auto-Merge to Main

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: 5000
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      MQTT_BROKER: mqtt://localhost:1883
      MQTT_TOPIC: forest/sensor/data
      SOUND_THRESHOLD_DB: 80
      TEMP_THRESHOLD_C: 55
      DEDUP_MINUTES: 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run tests
        working-directory: ./backend
        run: npm test

  test-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Lint
        working-directory: ./frontend
        run: npm run lint
      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL_CLOUD: ${{ secrets.VITE_API_URL_CLOUD }}
          VITE_API_URL_LOCAL: http://localhost:5000/api

  test-simulator:
    name: Simulator Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paho-mqtt pytest
      - name: Run simulator tests
        run: pytest simulator/tests/ -v

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build ./backend -t smartforest-backend

  auto-merge-to-main:
    name: Auto-merge to Main
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-simulator, docker-build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Merge develop into main
        run: |
          git checkout main
          git merge develop --no-ff -m "ci: auto-merge develop into main [skip ci]"
          git push origin main
