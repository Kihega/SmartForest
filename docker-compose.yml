version: '3.8'

# Render.com cloud deployment only.
# Frontend is on Vercel (no Docker needed there).
# Local dev: run Node and Mosquitto directly without Docker.

services:

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    depends_on:
      - mqtt-broker
    restart: unless-stopped

  mqtt-broker:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  simulator:
    build: ./simulator
    environment:
      - MQTT_BROKER_HOST=mqtt-broker
      - MQTT_BROKER_PORT=1883
      - MQTT_TOPIC=forest/sensor/data
      - SEND_INTERVAL=5
      - SPIKE_CHANCE=0.20
    depends_on:
      - mqtt-broker
    restart: unless-stopped
